version: "2"

# golangci-lint v2 configuration for dashgen
# Scope: deterministic CLI tool — favor correctness and idiom checks
# over churn-heavy style/complexity enforcement.

run:
  timeout: 5m
  tests: true
  go: '1.25'

linters:
  default: none
  enable:
    # Correctness (typecheck is always on in v2)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Error handling
    - errorlint
    - bodyclose
    # Idiom and clarity (gosimple + stylecheck merged into staticcheck in v2)
    - revive
    - misspell
    - unconvert
    - unparam
  exclusions:
    paths:
      - testdata
      - vendor
    rules:
      # Tests can be more permissive about error checks for setup/cleanup.
      - path: _test\.go
        linters:
          - errcheck
          - unparam
  settings:
    errcheck:
      exclude-functions:
        # Stdout/stderr writes — error paths not actionable for a CLI tool.
        - fmt.Fprintln
        - fmt.Fprintf
        - (*os.File).Write
        - (io.Writer).Write
        # Close/Remove in deferred cleanup or error paths — best-effort.
        - (io.Closer).Close
        - (*os.File).Close
        - os.Remove
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
