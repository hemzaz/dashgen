# Migration tier table — dashgen v0.3 recipe DSL (T0.4 / Phase 0 design freeze).
#
# Maps all 44 original Go recipes to 47 target YAML recipes (3 splits).
# Authoritative source: docs/RECIPES-DSL.md §12.1
#
# Fields:
#   name                  : recipe name (matches Recipe.Name())
#   source                : source Go file (relative to repo root)
#   target                : target YAML path ("" for split-parent tombstones)
#   tier                  : migration complexity (A | B | C)
#   schema_features       : CUE constraint names used (valid set from schema.cue)
#   expected_golden_delta : "none" (golden unchanged) | "regen" (must regenerate)
#   splits                : child recipe names for split parents; [] otherwise
#   notes                 : migration notes from §12.1
#
# Counts: total=47  regen=3  tier_A=9  tier_B=15  tier_C=23
# Note: §12.2 phases budget A=10 B=12 C=22; row-level labels in §12.1 yield
#       A=9 B=15 C=20+3_split_children=23. Discrepancy flagged for team review.
# Note: infra_network §12.1 inline says "choose single-recipe-two-panel" but
#       split treatment is required to reach the 47-recipe target count.

